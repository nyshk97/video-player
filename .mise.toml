[tools]
xcodegen = "2.45.4"

[tasks.gen]
description = "project.yml から Xcode プロジェクトを再生成"
run = "xcodegen generate"

[tasks.build]
description = "iOS Simulator 向けにビルド (iOS 26.5 simulator runtime 未インストールのため -sdk iphonesimulator で destination を回避)"
run = "xcodebuild -project VideoPlayer.xcodeproj -scheme VideoPlayer -sdk iphonesimulator -configuration Debug build"

[tasks.install]
description = "起動中のシミュレータにアプリをインストール"
run = """
APP_PATH=$(xcodebuild -project VideoPlayer.xcodeproj -scheme VideoPlayer -destination 'generic/platform=iOS Simulator' -configuration Debug -showBuildSettings 2>/dev/null | awk -F' = ' '/ BUILT_PRODUCTS_DIR /{print $2}')
xcrun simctl install booted "$APP_PATH/VideoPlayer.app"
"""

[tasks.run]
description = "ビルド → インストール → 起動 (シミュレータが起動済み前提)"
depends = ["build", "install"]
run = "xcrun simctl launch booted com.d0ne1s.VideoPlayer"

[tasks.boot]
description = "iPhone 17 シミュレータを起動"
run = """
xcrun simctl boot 9B64B4CF-862F-400A-8849-D14812383729 2>/dev/null || true
open -a Simulator
"""

[tasks.shot]
description = "起動中シミュレータのスクリーンショットを /tmp/vp.png に保存"
run = "xcrun simctl io booted screenshot /tmp/vp.png"
