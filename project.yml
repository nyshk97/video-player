name: Vid
options:
  bundleIdPrefix: com.d0ne1s
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: ja
    ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  Vid:
    build:
      targets:
        Vid: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Vid:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vid
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.vid
        PRODUCT_NAME: Vid
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"  # iPhone のみ
        # 実機ビルド時は Xcode の Signing & Capabilities で Personal Team を選択する
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "保存されている動画の一覧表示、再生、削除、トリミング保存のために写真ライブラリへのアクセス許可が必要です。"
        INFOPLIST_KEY_CFBundleDisplayName: "Vid"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
