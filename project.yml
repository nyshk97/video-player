name: VideoPlayer
options:
  bundleIdPrefix: com.d0ne1s
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: ja
    ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  VideoPlayer:
    build:
      targets:
        VideoPlayer: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  VideoPlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VideoPlayer
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.VideoPlayer
        PRODUCT_NAME: VideoPlayer
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"  # iPhone のみ
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "保存されている動画を一覧・再生するためにアクセス許可が必要です。"
        INFOPLIST_KEY_CFBundleDisplayName: "動画プレイヤー"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
